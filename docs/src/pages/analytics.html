<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Brew & Code — Admin Dashboard</title>
		<link rel="stylesheet" href="../styles/admin.css" />
	</head>
	<body>
		<aside class="sidebar" id="sidebar">
			<div class="sidebar-logo">Brew<span> & Code</span></div>
			<nav class="sidebar-nav">
				<ul>
					<li class="sidebar-nav-item">
						<a href="./admin.html">
							<span class="nav-icon">📦</span>
							<span>Products</span>
						</a>
					</li>
					<li class="sidebar-nav-item">
						<a href="./orders.html">
							<span class="nav-icon">🛒</span>
							<span>Orders</span>
						</a>
					</li>
					<li class="sidebar-nav-item">
						<a href="./customers.html">
							<span class="nav-icon">👥</span>
							<span>Customers</span>
						</a>
					</li>
					<li class="sidebar-nav-item">
						<a href="./analytics.html">
							<span class="nav-icon">📊</span>
							<span>Analytics</span>
						</a>
					</li>
					<li class="sidebar-nav-item">
						<a href="#settings">
							<span class="nav-icon">⚙️</span>
							<span>Settings</span>
						</a>
					</li>
				</ul>
			</nav>
			<div class="sidebar-footer">
				<a href="./login.html" class="sidebar-logout"> <span>🚪</span> Logout </a>
			</div>
		</aside>
		<div class="admin-layout">
			<!-- TOP BAR -->
			<header class="topbar">
				<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
				<div class="topbar-title">
					<h1>Admin Dashboard</h1>
					<p>Manage your Brew & Code products</p>
				</div>
				<div class="topbar-user">
					<div class="topbar-avatar">A</div>
					<span class="topbar-name" id="navbarName"></span>
				</div>
			</header>

			<!-- MAIN -->
			<main class="admin-main">
				<!-- STATS STRIP SKELETON -->
				<div class="stats-strip skeleton-loading skeleton-hidden" id="statsSkeleton">
					<div class="stat-card">
						<div class="stat-card-icon skeleton"></div>
						<div class="stat-card-body">
							<span class="stat-card-value skeleton"></span>
							<span class="stat-card-label skeleton"></span>
						</div>
					</div>
					<div class="stat-card">
						<div class="stat-card-icon skeleton"></div>
						<div class="stat-card-body">
							<span class="stat-card-value skeleton"></span>
							<span class="stat-card-label skeleton"></span>
						</div>
					</div>
					<div class="stat-card">
						<div class="stat-card-icon skeleton"></div>
						<div class="stat-card-body">
							<span class="stat-card-value skeleton"></span>
							<span class="stat-card-label skeleton"></span>
						</div>
					</div>
					<div class="stat-card">
						<div class="stat-card-icon skeleton"></div>
						<div class="stat-card-body">
							<span class="stat-card-value skeleton"></span>
							<span class="stat-card-label skeleton"></span>
						</div>
					</div>
				</div>

				<!-- STATS STRIP -->
				<div class="stats-strip skeleton-hidden" id="statsStrip">
					<div class="stat-card">
						<div class="stat-card-icon">📦</div>
						<div class="stat-card-body">
							<span class="stat-card-value" id="totalProducts">—</span>
							<span class="stat-card-label">Total Products</span>
						</div>
					</div>
					<div class="stat-card">
						<div class="stat-card-icon">🛒</div>
						<div class="stat-card-body">
							<span class="stat-card-value" id="totalOrders">—</span>
							<span class="stat-card-label">Total Orders</span>
						</div>
					</div>
					<div class="stat-card">
						<div class="stat-card-icon">👥</div>
						<div class="stat-card-body">
							<span class="stat-card-value" id="totalCustomers">—</span>
							<span class="stat-card-label">Customers</span>
						</div>
					</div>
					<div class="stat-card">
						<div class="stat-card-icon">💰</div>
						<div class="stat-card-body">
							<span class="stat-card-value" id="totalRevenue">—</span>
							<span class="stat-card-label">Revenue</span>
						</div>
					</div>
				</div>
				<div class="analytics-charts">
					<!-- CHART SKELETON -->
					<div class="analytics-chart-frame skeleton-chart skeleton-hidden" id="chartSkeleton">
						<div class="skeleton" style="width: 100%; height: 100%;"></div>
					</div>
					<canvas id="productGraph" aria-label="Products sold chart" class="skeleton-hidden"></canvas>
				</div>
			</main>
		</div>
		<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<script defer type="module" src="../js/analytics.js"></script>
	</body>
</html>
